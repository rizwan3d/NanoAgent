name: release

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish, for example v1.0.0
        required: true
        type: string
      ref:
        description: Git ref to build for a manual release
        required: false
        default: master
        type: string

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

permissions: {}

env:
  CONFIGURATION: Release
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  SOLUTION_FILE: NanoAgent.slnx

jobs:
  validate:
    name: Validate release build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.release_version.outputs.release_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            NanoAgent/packages.lock.json
            NanoAgent.CLI/packages.lock.json
            NanoAgent.Desktop/packages.lock.json
            NanoAgent.Tests/packages.lock.json

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION_FILE }} --locked-mode

      - name: Resolve release version
        id: release_version
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          version="${version#V}"

          if [[ -z "$version" ]]; then
            echo "Release tag '$RELEASE_TAG' did not contain a version." >&2
            exit 1
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,3}(-[0-9A-Za-z][0-9A-Za-z.-]*)?(\+[0-9A-Za-z][0-9A-Za-z.-]*)?$ ]]; then
            echo "Release tag '$RELEASE_TAG' is not a valid .NET version after removing the v/V prefix." >&2
            exit 1
          fi

          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "release_version=$version" >> "$GITHUB_OUTPUT"

      - name: Build
        run: >
          dotnet build ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          /p:Version=${{ steps.release_version.outputs.release_version }}
          /p:InformationalVersion=${{ env.RELEASE_TAG }}

      - name: Test
        run: >
          dotnet test ${{ env.SOLUTION_FILE }}
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          /p:Version=${{ steps.release_version.outputs.release_version }}
          /p:InformationalVersion=${{ env.RELEASE_TAG }}
          --logger "trx;LogFileName=release-test-results.trx"
          --results-directory ./artifacts/test-results

      - name: Upload validation test results
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: release-test-results
          path: artifacts/test-results
          if-no-files-found: warn
          retention-days: 14

  release-approval:
    name: Approve production release
    needs: validate
    runs-on: ubuntu-24.04
    environment:
      name: production-release
    permissions: {}

    steps:
      - name: Approval complete
        run: echo "Production release approved for $RELEASE_TAG."

  publish:
    name: Publish ${{ matrix.display_name }} ${{ matrix.rid }}
    needs:
      - validate
      - release-approval
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      RELEASE_VERSION: ${{ needs.validate.outputs.release_version }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - display_name: CLI
            app_id: cli
            package_name: NanoAgent.CLI
            project: NanoAgent.CLI/NanoAgent.CLI.csproj
            runner: windows-2025
            rid: win-x64
            artifact_name: cli-win-x64

          - display_name: CLI
            app_id: cli
            package_name: NanoAgent.CLI
            project: NanoAgent.CLI/NanoAgent.CLI.csproj
            runner: ubuntu-24.04
            rid: linux-x64
            artifact_name: cli-linux-x64

          - display_name: CLI
            app_id: cli
            package_name: NanoAgent.CLI
            project: NanoAgent.CLI/NanoAgent.CLI.csproj
            runner: ubuntu-24.04-arm
            rid: linux-arm64
            artifact_name: cli-linux-arm64

          - display_name: CLI
            app_id: cli
            package_name: NanoAgent.CLI
            project: NanoAgent.CLI/NanoAgent.CLI.csproj
            runner: macos-15-intel
            rid: osx-x64
            artifact_name: cli-osx-x64

          - display_name: CLI
            app_id: cli
            package_name: NanoAgent.CLI
            project: NanoAgent.CLI/NanoAgent.CLI.csproj
            runner: macos-15
            rid: osx-arm64
            artifact_name: cli-osx-arm64

          - display_name: Desktop
            app_id: desktop
            package_name: NanoAgent.Desktop
            project: NanoAgent.Desktop/NanoAgent.Desktop.csproj
            runner: windows-2025
            rid: win-x64
            artifact_name: desktop-win-x64

          - display_name: Desktop
            app_id: desktop
            package_name: NanoAgent.Desktop
            project: NanoAgent.Desktop/NanoAgent.Desktop.csproj
            runner: ubuntu-24.04
            rid: linux-x64
            artifact_name: desktop-linux-x64

          - display_name: Desktop
            app_id: desktop
            package_name: NanoAgent.Desktop
            project: NanoAgent.Desktop/NanoAgent.Desktop.csproj
            runner: ubuntu-24.04-arm
            rid: linux-arm64
            artifact_name: desktop-linux-arm64

          - display_name: Desktop
            app_id: desktop
            package_name: NanoAgent.Desktop
            project: NanoAgent.Desktop/NanoAgent.Desktop.csproj
            runner: macos-15-intel
            rid: osx-x64
            artifact_name: desktop-osx-x64

          - display_name: Desktop
            app_id: desktop
            package_name: NanoAgent.Desktop
            project: NanoAgent.Desktop/NanoAgent.Desktop.csproj
            runner: macos-15
            rid: osx-arm64
            artifact_name: desktop-osx-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_REF }}

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            NanoAgent/packages.lock.json
            NanoAgent.CLI/packages.lock.json
            NanoAgent.Desktop/packages.lock.json
            NanoAgent.Tests/packages.lock.json

      - name: Prepare artifact directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path `
            "$env:GITHUB_WORKSPACE/artifacts/publish/${{ matrix.app_id }}", `
            "$env:GITHUB_WORKSPACE/artifacts/packages" | Out-Null

      - name: Publish ${{ matrix.display_name }} app
        run: >
          dotnet publish ${{ matrix.project }}
          --configuration ${{ env.CONFIGURATION }}
          --runtime ${{ matrix.rid }}
          --self-contained true
          /p:Version=${{ env.RELEASE_VERSION }}
          /p:InformationalVersion=${{ env.RELEASE_TAG }}
          --output ./artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}

      - name: Prepare Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_BASE64: ${{ secrets.WINDOWS_CODESIGN_CERT_BASE64 }}
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_BASE64)) {
            throw "WINDOWS_CODESIGN_CERT_BASE64 is required for Windows release signing."
          }

          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_PASSWORD)) {
            throw "WINDOWS_CODESIGN_CERT_PASSWORD is required for Windows release signing."
          }

          $certificatePath = Join-Path $env:RUNNER_TEMP "nanoagent-authenticode.pfx"
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_CODESIGN_CERT_BASE64))

          "WINDOWS_CODESIGN_CERT_PATH=$certificatePath" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Sign Windows executables
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_PATH) -or -not (Test-Path $env:WINDOWS_CODESIGN_CERT_PATH)) {
            throw "Windows signing certificate was not prepared."
          }

          $timestampUrl = $env:WINDOWS_CODESIGN_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if ($null -eq $signtool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}"
          $executables = Get-ChildItem -Path $publishDir -Recurse -File |
            Where-Object { $_.Extension -ieq ".exe" } |
            Sort-Object FullName

          if ($executables.Count -eq 0) {
            throw "No Windows executables were found to sign in $publishDir."
          }

          foreach ($executable in $executables) {
            & $signtool.FullName sign `
              /fd SHA256 `
              /tr $timestampUrl `
              /td SHA256 `
              /f $env:WINDOWS_CODESIGN_CERT_PATH `
              /p $env:WINDOWS_CODESIGN_CERT_PASSWORD `
              /v `
              $executable.FullName

            if ($LASTEXITCODE -ne 0) {
              throw "Failed to Authenticode sign $($executable.FullName)."
            }

            & $signtool.FullName verify /pa /v $executable.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Authenticode verification failed for $($executable.FullName)."
            }
          }

      - name: Prepare macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 }}
          MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail

          for name in \
            MACOS_DEVELOPER_ID_CERTIFICATE_BASE64 \
            MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD \
            MACOS_CODESIGN_IDENTITY
          do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required for macOS release signing." >&2
              exit 1
            fi
          done

          certificate_path="$RUNNER_TEMP/nanoagent-developer-id.p12"
          keychain_path="$RUNNER_TEMP/nanoagent-signing.keychain-db"
          keychain_password="$(uuidgen)"

          printf '%s' "$MACOS_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 -D > "$certificate_path"

          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$certificate_path" \
            -P "$MACOS_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$keychain_path"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$keychain_password" \
            "$keychain_path"

          security find-identity -v -p codesigning "$keychain_path"

          {
            echo "MACOS_SIGNING_KEYCHAIN=$keychain_path"
          } >> "$GITHUB_ENV"

      - name: Sign macOS binaries
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
        run: |
          set -euo pipefail

          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}"
          signed_count=0

          while IFS= read -r -d '' file_path; do
            if file "$file_path" | grep -q "Mach-O"; then
              codesign \
                --force \
                --timestamp \
                --options runtime \
                --keychain "$MACOS_SIGNING_KEYCHAIN" \
                --sign "$MACOS_CODESIGN_IDENTITY" \
                "$file_path"
              codesign --verify --strict --verbose=2 "$file_path"
              signed_count=$((signed_count + 1))
            fi
          done < <(find "$publish_dir" -type f -print0)

          while IFS= read -r -d '' app_bundle; do
            codesign \
              --force \
              --deep \
              --strict \
              --timestamp \
              --options runtime \
              --keychain "$MACOS_SIGNING_KEYCHAIN" \
              --sign "$MACOS_CODESIGN_IDENTITY" \
              "$app_bundle"
            codesign --verify --deep --strict --verbose=2 "$app_bundle"
          done < <(find "$publish_dir" -type d -name "*.app" -print0)

          if [[ "$signed_count" -eq 0 ]]; then
            echo "No Mach-O binaries were found to sign in $publish_dir." >&2
            exit 1
          fi

      - name: Package published output on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archivePath = Join-Path $env:GITHUB_WORKSPACE "artifacts/packages/${{ matrix.package_name }}-${{ matrix.rid }}.zip"

          if (Test-Path $archivePath) {
            Remove-Item $archivePath -Force
          }

          Compress-Archive `
            -Path "$env:GITHUB_WORKSPACE/artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}/*" `
            -DestinationPath $archivePath

      - name: Build Windows desktop installer
        if: runner.os == 'Windows' && matrix.app_id == 'desktop'
        shell: pwsh
        run: |
          choco install innosetup --no-progress --yes

          $version = $env:RELEASE_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "0.0.0"
          }

          $scriptPath = Join-Path $env:RUNNER_TEMP "NanoAgent.Desktop.iss"
          $publishDir = (Join-Path $env:GITHUB_WORKSPACE "artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}").Replace('\', '\\')
          $outputDir = (Join-Path $env:GITHUB_WORKSPACE "artifacts/packages").Replace('\', '\\')

          @"
          #define MyAppName "NanoAgent Desktop"
          #define MyAppVersion "$version"
          #define MyAppPublisher "NanoAgent"
          #define MyAppExeName "NanoAgent.Desktop.exe"

          [Setup]
          AppId={{99F60D6D-6C4D-4CB8-934F-03CBF59D34BC}
          AppName={#MyAppName}
          AppVersion={#MyAppVersion}
          AppPublisher={#MyAppPublisher}
          DefaultDirName={autopf}\NanoAgent Desktop
          DefaultGroupName=NanoAgent Desktop
          DisableProgramGroupPage=yes
          OutputDir=$outputDir
          OutputBaseFilename=NanoAgent.Desktop-${{ matrix.rid }}-setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern
          ArchitecturesAllowed=x64compatible
          ArchitecturesInstallIn64BitMode=x64compatible

          [Files]
          Source: "$publishDir\\*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\NanoAgent Desktop"; Filename: "{app}\{#MyAppExeName}"
          Name: "{autodesktop}\NanoAgent Desktop"; Filename: "{app}\{#MyAppExeName}"; Tasks: desktopicon

          [Tasks]
          Name: "desktopicon"; Description: "Create a desktop shortcut"; GroupDescription: "Additional icons:"; Flags: unchecked

          [Run]
          Filename: "{app}\{#MyAppExeName}"; Description: "Launch NanoAgent Desktop"; Flags: nowait postinstall skipifsilent
          "@ | Set-Content -Path $scriptPath -Encoding UTF8

          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" $scriptPath

      - name: Sign Windows desktop installer
        if: runner.os == 'Windows' && matrix.app_id == 'desktop'
        shell: pwsh
        env:
          WINDOWS_CODESIGN_CERT_PASSWORD: ${{ secrets.WINDOWS_CODESIGN_CERT_PASSWORD }}
          WINDOWS_CODESIGN_TIMESTAMP_URL: ${{ secrets.WINDOWS_CODESIGN_TIMESTAMP_URL }}
        run: |
          $timestampUrl = $env:WINDOWS_CODESIGN_TIMESTAMP_URL
          if ([string]::IsNullOrWhiteSpace($timestampUrl)) {
            $timestampUrl = "http://timestamp.digicert.com"
          }

          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "\\x64\\signtool\.exe$" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if ($null -eq $signtool) {
            throw "signtool.exe was not found on the Windows runner."
          }

          $installerPath = Join-Path $env:GITHUB_WORKSPACE "artifacts/packages/NanoAgent.Desktop-${{ matrix.rid }}-setup.exe"
          if (-not (Test-Path $installerPath)) {
            throw "Windows desktop installer was not found at $installerPath."
          }

          & $signtool.FullName sign `
            /fd SHA256 `
            /tr $timestampUrl `
            /td SHA256 `
            /f $env:WINDOWS_CODESIGN_CERT_PATH `
            /p $env:WINDOWS_CODESIGN_CERT_PASSWORD `
            /v `
            $installerPath

          if ($LASTEXITCODE -ne 0) {
            throw "Failed to Authenticode sign $installerPath."
          }

          & $signtool.FullName verify /pa /v $installerPath
          if ($LASTEXITCODE -ne 0) {
            throw "Authenticode verification failed for $installerPath."
          }

      - name: Package published output on Linux and macOS
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          archive_path="$GITHUB_WORKSPACE/artifacts/packages/${{ matrix.package_name }}-${{ matrix.rid }}.zip"
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}"

          rm -f "$archive_path"

          if [[ "$RUNNER_OS" == "macOS" ]]; then
            ditto -c -k --sequesterRsrc "$publish_dir" "$archive_path"
          else
            cd "$publish_dir"
            zip -r "$archive_path" .
          fi

      - name: Notarize macOS package
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
          MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
        run: |
          set -euo pipefail

          for name in MACOS_NOTARY_APPLE_ID MACOS_NOTARY_TEAM_ID MACOS_NOTARY_PASSWORD
          do
            if [[ -z "${!name:-}" ]]; then
              echo "$name is required for macOS notarization." >&2
              exit 1
            fi
          done

          archive_path="$GITHUB_WORKSPACE/artifacts/packages/${{ matrix.package_name }}-${{ matrix.rid }}.zip"
          publish_dir="$GITHUB_WORKSPACE/artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}"

          xcrun notarytool submit "$archive_path" \
            --apple-id "$MACOS_NOTARY_APPLE_ID" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --wait \
            --timeout 30m

          stapled_app=0
          while IFS= read -r -d '' app_bundle; do
            xcrun stapler staple "$app_bundle"
            xcrun stapler validate "$app_bundle"
            stapled_app=1
          done < <(find "$publish_dir" -type d -name "*.app" -print0)

          if [[ "$stapled_app" -eq 1 ]]; then
            rm -f "$archive_path"
            ditto -c -k --sequesterRsrc "$publish_dir" "$archive_path"
          fi

      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: ./artifacts/publish/${{ matrix.app_id }}/${{ matrix.rid }}
          format: cyclonedx-json
          output-file: ./artifacts/packages/${{ matrix.package_name }}-${{ matrix.rid }}.sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
          dependency-snapshot: false

      - name: Remove Windows signing certificate
        if: always() && runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_CODESIGN_CERT_PATH) -and (Test-Path $env:WINDOWS_CODESIGN_CERT_PATH)) {
            Remove-Item -LiteralPath $env:WINDOWS_CODESIGN_CERT_PATH -Force
          }

      - name: Remove macOS signing keychain
        if: always() && runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${MACOS_SIGNING_KEYCHAIN:-}" && -f "$MACOS_SIGNING_KEYCHAIN" ]]; then
            security delete-keychain "$MACOS_SIGNING_KEYCHAIN"
          fi

      - name: Upload packaged artifact
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        with:
          name: ${{ matrix.artifact_name }}
          path: ./artifacts/packages/${{ matrix.package_name }}-${{ matrix.rid }}*
          if-no-files-found: error
          retention-days: 14

  publish-release:
    name: Publish GitHub release
    needs: publish
    runs-on: ubuntu-24.04
    permissions:
      attestations: write
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Download packaged artifacts
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5
        with:
          path: ./artifacts/release

      - name: Stage release assets
        shell: bash
        run: |
          set -euo pipefail

          release_dir="$GITHUB_WORKSPACE/artifacts/release-assets"
          mkdir -p "$release_dir"

          while IFS= read -r asset_path; do
            asset_name="$(basename "$asset_path")"
            destination="$release_dir/$asset_name"

            if [[ -e "$destination" ]]; then
              echo "Duplicate release asset name detected: $asset_name" >&2
              exit 1
            fi

            cp "$asset_path" "$destination"
          done < <(
            find "$GITHUB_WORKSPACE/artifacts/release" -type f \
              \( -name '*.zip' -o -name '*.exe' -o -name '*.sbom.cdx.json' \) |
              sort
          )

          asset_count="$(find "$release_dir" -maxdepth 1 -type f | wc -l | tr -d ' ')"
          if [[ "$asset_count" -eq 0 ]]; then
            echo "No release assets were found." >&2
            exit 1
          fi

      - name: Create SHA256 checksums
        shell: bash
        run: |
          set -euo pipefail

          release_dir="$GITHUB_WORKSPACE/artifacts/release-assets"

          (
            cd "$release_dir"
            find . -maxdepth 1 -type f ! -name SHA256SUMS -printf '%P\0' |
              sort -z |
              xargs -0 sha256sum
          ) > "$release_dir/SHA256SUMS"

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3.0.0
        with:
          subject-checksums: ./artifacts/release-assets/SHA256SUMS

      - name: Create release notes
        id: release_notes
        shell: bash
        run: |
          set -euo pipefail

          notes_file="$RUNNER_TEMP/release-notes.md"
          previous_tag="$(git tag --sort=-creatordate | grep -Fxv "$RELEASE_TAG" | head -n 1 || true)"

          if [[ -n "$previous_tag" ]]; then
            commit_lines="$(git log "${previous_tag}..HEAD" --pretty=format:'- %s (%h)' --no-merges)"
          else
            commit_lines="$(git log HEAD --pretty=format:'- %s (%h)' --no-merges)"
          fi

          asset_lines="$(
            find "$GITHUB_WORKSPACE/artifacts/release-assets" -maxdepth 1 -type f |
              sort |
              while IFS= read -r asset_path; do
                printf -- '- %s\n' "$(basename "$asset_path")"
              done
          )"

          {
            echo "# NanoAgent $RELEASE_TAG"
            echo
            echo "## Release assets"
            echo
            echo "${asset_lines:-- No release assets were produced.}"
            echo
            echo "## Verification"
            echo
            echo "- SHA256 hashes are published in SHA256SUMS."
            echo "- CycloneDX SBOM files are published beside the packages."
            echo "- GitHub artifact attestations are generated for the checksummed assets."
            echo
            echo "## Commit messages"
            echo
            echo "${commit_lines:-- Initial release.}"
          } > "$notes_file"

          echo "path=$notes_file" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="$RELEASE_TAG"
          title="NanoAgent $tag"
          target_sha="$(git rev-parse HEAD)"
          mapfile -t assets < <(find "$GITHUB_WORKSPACE/artifacts/release-assets" -maxdepth 1 -type f | sort)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No release assets were found." >&2
            exit 1
          fi

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
            gh release edit "$tag" --title "$title" --notes-file "${{ steps.release_notes.outputs.path }}"
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$title" \
              --notes-file "${{ steps.release_notes.outputs.path }}" \
              --target "$target_sha"
          fi
