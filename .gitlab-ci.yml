stages:
  - review
  - docker
  
nanoai_merge_request_review:
  stage: review
  image: ubuntu:24.04
  variables:
    GIT_DEPTH: "0"
    GIT_STRATEGY: fetch
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_DRAFT != "true" && $CI_MERGE_REQUEST_TITLE !~ /^(\[Draft\]|\(Draft\)|Draft:)/'
  before_script:
    - apt-get update
    - apt-get install -y --no-install-recommends bash ca-certificates curl git
    - curl -fsSL https://raw.githubusercontent.com/rizwan3d/NanoAgent/master/scripts/install.sh | bash
    - export PATH="$HOME/.local/bin:$PATH"
  script:
    - bash .gitlab/nanoai-gitlab-review.sh
  artifacts:
    when: always
    expire_in: 14 days
    paths:
      - artifacts/nanoai-review/

docker_build_push:
  stage: docker
  image: docker:27
  services:
    - name: docker:27-dind
      alias: docker
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
    DOCKER_DRIVER: overlay2

    REGISTRY_URL: server.alfain.tech:27500
    IMAGE_NAME: server.alfain.tech:27500/qrcode/qr-code

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual

  before_script:
    - echo "$REGISTRY_TOKEN" | docker login "$REGISTRY_URL" -u "$REGISTRY_USERNAME" --password-stdin

  script:
    - docker build -t "$IMAGE_NAME:latest" -t "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA" .
    - docker push "$IMAGE_NAME:latest"
    - docker push "$IMAGE_NAME:$CI_COMMIT_SHORT_SHA"